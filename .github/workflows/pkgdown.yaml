name: pkgdown

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Prevent concurrent deployments from overwriting each other on gh-pages.
# A new push cancels any still-running deployment on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-22.04
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # OptiSparseMET is pure R; disabling compilation saves install time.
          needs-compilation: false

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            any::roxygen2
            any::Matrix
            local::.
          needs: website

      - name: Document package
        shell: Rscript {0}
        run: |
          roxygen2::roxygenise()

      - name: Build site
        shell: Rscript {0}
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
