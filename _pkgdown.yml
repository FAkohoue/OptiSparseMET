url: https://FAkohoue.github.io/OptiSparseMET/

development:
  mode: release

favicon: pkgdown/assets/favicon.ico

template:
  bootstrap: 5
  includes:
    in_header: pkgdown/assets/favicon.html
  bslib:
    primary: "#0C4C80"
    secondary: "#3AA0FF"
    success: "#7ED957"
    base_font: { google: "Inter" }
    heading_font: { google: "Inter" }
    code_font: { google: "Fira Code" }

authors:
  Félicien Akohoue:
    href: https://github.com/FAkohoue

home:
  title: OptiSparseMET — Sparse Multi-Environment Trial Design
  description: >
    An R package for designing sparse multi-environment trials by jointly
    optimizing across-environment treatment allocation and within-environment
    field layout construction, with support for genetic structure constraints
    and seed availability.

reference:
  - title: Across-environment allocation
    contents:
      - allocate_sparse_met
      - check_balanced_incomplete_feasibility
      - derive_allocation_groups

  - title: Feasibility and capacity helpers
    contents:
      - feasibility_helpers
      - min_k_for_full_coverage
      - suggest_safe_k
      - warn_if_k_too_small

  - title: Seed-aware replication
    contents:
      - assign_replication_by_seed

  - title: Within-environment field design
    contents:
      - prep_famoptg
      - alpha_rc_stream

  - title: Pipeline and assembly
    contents:
      - plan_sparse_met_design
      - combine_met_fieldbooks

  - title: Example data
    contents:
      - OptiSparseMET_example_data

navbar:
  structure:
    left:  [home, reference, articles]
    right: [github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Vignettes
      href: articles/index.html
    github:
      icon: fab fa-github
      href: https://github.com/FAkohoue/OptiSparseMET/
      aria-label: "GitHub repository"
